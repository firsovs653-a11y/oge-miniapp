<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ОГЭ Информатика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .task-list {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .task-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .task-desc {
            font-size: 14px;
            color: #666;
        }

        .code-area {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }

        textarea {
            width: 100%;
            font-family: monospace;
            font-size: 14px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
        }

        .result.correct {
            background: #d4edda;
            color: #155724;
        }

        .result.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .back-btn {
            background: #6c757d;
            margin-bottom: 16px;
        }

        h2 {
            margin-bottom: 16px;
        }

        .input-example {
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="task-list-view">
            <h2>📚 Задания ОГЭ</h2>
            <div class="task-list" id="tasks"></div>
        </div>

        <div id="task-view" style="display: none;">
            <button class="back-btn" onclick="showTaskList()">← Назад</button>
            <div class="code-area">
                <h3 id="task-title"></h3>
                <p id="task-description"></p>
                <div class="input-example">
                    <strong>📥 Пример ввода:</strong><br>
                    <code id="test-input"></code>
                </div>
                <div class="input-example">
                    <strong>📤 Ожидаемый вывод:</strong><br>
                    <code id="expected-output"></code>
                </div>
                <textarea id="code-input" rows="10" placeholder="Напиши свой код на Python..."></textarea>
                <button onclick="checkCode()">Проверить</button>
                <div id="result"></div>
            </div>
        </div>
    </div>

    <script>
        let currentTaskId = null;

        fetch('/api/tasks')
            .then(res => res.json())
            .then(tasks => {
                const container = document.getElementById('tasks');
                container.innerHTML = '';
                for (const [id, task] of Object.entries(tasks)) {
                    const div = document.createElement('div');
                    div.className = 'task-item';
                    div.onclick = () => showTask(id);
                    div.innerHTML = `
                        <div class="task-title">Задание ${id}: ${task.title}</div>
                        <div class="task-desc">${task.description.substring(0, 100)}...</div>
                    `;
                    container.appendChild(div);
                }
            });

        function showTask(taskId) {
            currentTaskId = taskId;
            fetch(`/api/task/${taskId}`)
                .then(res => res.json())
                .then(task => {
                    document.getElementById('task-title').innerText = `Задание ${taskId}: ${task.title}`;
                    document.getElementById('task-description').innerText = task.description;
                    document.getElementById('test-input').innerText = task.test_input;
                    document.getElementById('expected-output').innerText = task.expected_output;
                    document.getElementById('code-input').value = '';
                    document.getElementById('result').innerHTML = '';

                    document.getElementById('task-list-view').style.display = 'none';
                    document.getElementById('task-view').style.display = 'block';
                });
        }

        function showTaskList() {
            document.getElementById('task-list-view').style.display = 'block';
            document.getElementById('task-view').style.display = 'none';
        }

        function checkCode() {
            const code = document.getElementById('code-input').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = '<div class="result">⏳ Проверка...</div>';

            fetch('/api/check', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    code: code,
                    task_id: currentTaskId
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.correct) {
                    resultDiv.innerHTML = `<div class="result correct">✅ Правильно! Твой вывод: ${data.output}</div>`;
                } else if (data.error) {
                    resultDiv.innerHTML = `<div class="result incorrect">❌ Ошибка выполнения:<br><code>${data.error}</code></div>`;
                } else {
                    resultDiv.innerHTML = `<div class="result incorrect">❌ Неправильно!<br><br>Твой вывод: ${data.output}<br><br>Ожидалось: ${data.expected}</div>`;
                }
            });
        }
    </script>
</body>
</html>
