<script>
    const socket = io(window.location.origin, { transports: ['websocket'] });
    const roomId = {{ room.id }};
    
    let isLocalAction = false;
    let currentVideoUrl = '';
    
    const video = document.getElementById('video-player');
    
    socket.emit('join', { room_id: roomId });
    
    function loadVideo(url) {
        currentVideoUrl = url;
        video.src = url;
        video.load();
        video.play().catch(e => console.log('Play error:', e));
    }
    
    function playVideo() {
        if (isLocalAction) return;
        isLocalAction = true;
        video.play();
        socket.emit('play', { room_id: roomId, current_time: video.currentTime });
        setTimeout(() => { isLocalAction = false; }, 200);
    }
    
    function pauseVideo() {
        if (isLocalAction) return;
        isLocalAction = true;
        video.pause();
        socket.emit('pause', { room_id: roomId, current_time: video.currentTime });
        setTimeout(() => { isLocalAction = false; }, 200);
    }
    
    window.searchYouTube = function() {
        const query = document.getElementById('search-query').value;
        if (!query.trim()) return;
        
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div style="text-align: center; padding: 20px;">⏳ Поиск...</div>';
        
        fetch('/api/search_youtube', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                resultsDiv.innerHTML = `<div style="color: red; padding: 10px;">❌ Ошибка: ${data.error}</div>`;
                return;
            }
            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding: 10px;">😔 Ничего не найдено</div>';
                return;
            }
            resultsDiv.innerHTML = '<div style="font-weight: 600; padding: 10px;">🎬 Результаты:</div>';
            data.results.forEach(video => {
                const item = document.createElement('div');
                item.style.cssText = 'padding: 10px; border-bottom: 1px solid #eee; cursor: pointer;';
                item.onclick = () => {
                    const videoUrl = `https://www.youtube.com/watch?v=${video.video_id}`;
                    loadVideo(videoUrl);
                    socket.emit('change_video', { room_id: roomId, video_url: videoUrl });
                    resultsDiv.style.display = 'none';
                };
                item.innerHTML = `<div style="font-weight: 500;">${video.title}</div>`;
                resultsDiv.appendChild(item);
            });
        });
    };
    
    window.searchVK = function() {
        const query = document.getElementById('search-query').value;
        if (!query.trim()) return;
        
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div style="text-align: center; padding: 20px;">⏳ Поиск VK...</div>';
        
        fetch('/api/search_vk', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                resultsDiv.innerHTML = `<div style="color: red; padding: 10px;">❌ Ошибка: ${data.error}</div>`;
                return;
            }
            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding: 10px;">😔 Ничего не найдено</div>';
                return;
            }
            resultsDiv.innerHTML = '<div style="font-weight: 600; padding: 10px;">🎬 Результаты VK:</div>';
            data.results.forEach(video => {
                const item = document.createElement('div');
                item.style.cssText = 'padding: 10px; border-bottom: 1px solid #eee; cursor: pointer;';
                item.onclick = () => {
                    loadVideo(video.video_url);
                    socket.emit('change_video', { room_id: roomId, video_url: video.video_url });
                    resultsDiv.style.display = 'none';
                };
                item.innerHTML = `<div style="font-weight: 500;">${video.title}</div>`;
                resultsDiv.appendChild(item);
            });
        })
        .catch(err => {
            resultsDiv.innerHTML = `<div style="color: red; padding: 10px;">❌ Ошибка: ${err}</div>`;
        });
    };
    
    socket.on('play_sync', (data) => {
        if (isLocalAction) return;
        isLocalAction = true;
        const diff = Math.abs(video.currentTime - data.current_time);
        if (diff > 0.5) {
            video.currentTime = data.current_time;
        }
        video.play();
        setTimeout(() => { isLocalAction = false; }, 300);
    });
    
    socket.on('pause_sync', (data) => {
        if (isLocalAction) return;
        isLocalAction = true;
        video.currentTime = data.current_time;
        video.pause();
        setTimeout(() => { isLocalAction = false; }, 200);
    });
    
    socket.on('seek_sync', (data) => {
        if (isLocalAction) return;
        isLocalAction = true;
        video.currentTime = data.current_time;
        setTimeout(() => { isLocalAction = false; }, 200);
    });
    
    socket.on('video_change_sync', (data) => {
        if (isLocalAction) return;
        isLocalAction = true;
        loadVideo(data.video_url);
        setTimeout(() => { isLocalAction = false; }, 500);
    });
    
    socket.on('connect', () => {
        console.log('✅ WebSocket connected');
        socket.emit('join', { room_id: roomId });
    });
</script>
