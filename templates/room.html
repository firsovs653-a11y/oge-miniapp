<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script>
    const socket = io(window.location.origin, { transports: ['websocket'] });
    const roomId = {{ room.id }};
    const video = document.getElementById('video-player');
    
    let isRemoteAction = false; // Флаг: действие инициировано удаленно
    let actionTimeout = null;   // Таймаут для сброса флага

    // Функция безопасной установки флага
    function setRemoteAction() {
        if (actionTimeout) clearTimeout(actionTimeout);
        isRemoteAction = true;
        actionTimeout = setTimeout(() => {
            isRemoteAction = false;
        }, 500); // Блокируем локальные события на 500мс после удаленной команды
    }
    
    socket.emit('join', { room_id: roomId });
    
    // ========== ЛОКАЛЬНОЕ УПРАВЛЕНИЕ ==========
    function playVideo() {
        video.play();
        socket.emit('play', { room_id: roomId, current_time: video.currentTime });
    }
    
    function pauseVideo() {
        video.pause();
        socket.emit('pause', { room_id: roomId, current_time: video.currentTime });
    }
    
    function changeVideo() {
        const url = document.getElementById('video-url').value;
        if (url) {
            video.src = url;
            video.load();
            video.play();
            socket.emit('change_video', { room_id: roomId, video_url: url });
        }
    }
    
    // ========== ПЕРЕХВАТ СОБЫТИЙ ПЛЕЕРА (только если не удаленное действие) ==========
    video.addEventListener('play', () => {
        if (!isRemoteAction) {
            socket.emit('play', { room_id: roomId, current_time: video.currentTime });
        }
    });
    
    video.addEventListener('pause', () => {
        if (!isRemoteAction) {
            socket.emit('pause', { room_id: roomId, current_time: video.currentTime });
        }
    });
    
    video.addEventListener('seeked', () => {
        if (!isRemoteAction) {
            socket.emit('seek', { room_id: roomId, current_time: video.currentTime });
        }
    });
    
    // ========== СИНХРОНИЗАЦИЯ (ПОЛУЧЕНИЕ КОМАНД) ==========
    socket.on('play_sync', (data) => {
        setRemoteAction();
        // Синхронизируем время, только если разница больше 0.3 сек (чтобы не дергать плеер лишний раз)
        if (Math.abs(video.currentTime - data.current_time) > 0.3) {
            video.currentTime = data.current_time;
        }
        video.play().catch(e => console.log('Play prevented:', e));
    });
    
    socket.on('pause_sync', (data) => {
        setRemoteAction();
        video.currentTime = data.current_time;
        video.pause();
    });
    
    socket.on('seek_sync', (data) => {
        setRemoteAction();
        video.currentTime = data.current_time;
        
        // ВАЖНО: Если видео остановилось из-за буферизации при перемотке,
        // но ведущий продолжает смотреть, нужно попробовать запустить его снова.
        // Можно попытаться играть, если на сервере есть флаг is_playing.
        // Пока просто игнорируем, так как в вашем протоколе нет флага is_playing в seek_sync.
        // Но если видео вдруг встало, это место для фикса.
    });
    
    socket.on('video_change_sync', (data) => {
        setRemoteAction();
        video.src = data.video_url;
        video.load();
        video.play().catch(e => console.log('Autoplay blocked, waiting for user interaction'));
    });
    
    // ========== ПОИСК VK (без изменений) ==========
    window.searchVK = function() {
        const query = document.getElementById('search-query').value;
        if (!query.trim()) return;
        
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div style="text-align: center; padding: 20px;">⏳ Поиск VK...</div>';
        
        fetch('/api/search_vk', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: query })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                resultsDiv.innerHTML = `<div style="color: red; padding: 10px;">❌ Ошибка: ${data.error}</div>`;
                return;
            }
            if (!data.results || data.results.length === 0) {
                resultsDiv.innerHTML = '<div style="padding: 10px;">😔 Ничего не найдено</div>';
                return;
            }
            resultsDiv.innerHTML = '<div style="font-weight: 600; padding: 10px;">🎬 Результаты VK:</div>';
            data.results.forEach(videoItem => {
                const item = document.createElement('div');
                item.style.cssText = 'padding: 10px; border-bottom: 1px solid #eee; cursor: pointer;';
                item.onclick = () => {
                    video.src = videoItem.video_url;
                    video.load();
                    video.play();
                    socket.emit('change_video', { room_id: roomId, video_url: videoItem.video_url });
                    resultsDiv.style.display = 'none';
                };
                item.innerHTML = `<div style="font-weight: 500;">${videoItem.title}</div>`;
                resultsDiv.appendChild(item);
            });
        });
    };
    
    socket.on('connect', () => {
        console.log('✅ WebSocket connected');
        socket.emit('join', { room_id: roomId });
    });
</script>
