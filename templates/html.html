<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ОГЭ Информатика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 10px;
        }

        .task {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .task-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
            color: #667eea;
        }

        .task-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .task-input {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            resize: vertical;
            margin-bottom: 15px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .output {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            margin-top: 10px;
            display: none;
        }

        .output.show {
            display: block;
        }

        .task-select {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #ddd;
            margin-bottom: 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 ОГЭ Информатика</h1>
            <p>Выбери задание и напиши код на Python</p>
        </div>

        <div class="card">
            <select class="task-select" id="taskSelect">
                <option value="1">Задание 1: Кратные 6 и оканчивающиеся на 4</option>
            </select>

            <div class="task" id="taskInfo">
                <div class="task-title" id="taskTitle">Задание 1</div>
                <div class="task-description" id="taskDesc">
                    Напишите программу, которая в последовательности натуральных чисел определяет количество чисел, кратных 6 и оканчивающихся на 4.
                </div>
                <div class="task-input">
                    <strong>📥 Пример ввода:</strong><br>
                    <span id="testInput">5<br>24<br>14<br>36<br>44<br>54</span>
                </div>
                <div class="task-input">
                    <strong>📤 Ожидаемый вывод:</strong><br>
                    <span id="expectedOutput">1</span>
                </div>
            </div>

            <textarea id="codeArea" placeholder="Напиши свой код Python здесь..."></textarea>

            <button onclick="checkCode()">🔍 Проверить код</button>

            <div id="result" class="result"></div>
            <div id="output" class="output"></div>
        </div>
    </div>

    <script>
        // Задания (можно расширять)
        const tasks = {
            "1": {
                title: "Кратные 6 и оканчивающиеся на 4",
                description: "Напишите программу, которая в последовательности натуральных чисел определяет количество чисел, кратных 6 и оканчивающихся на 4.",
                test_input: "5\n24\n14\n36\n44\n54",
                expected_output: "1"
            }
        };

        // Загрузка задания
        function loadTask(taskId) {
            const task = tasks[taskId];
            if (!task) return;

            document.getElementById('taskTitle').textContent = `Задание ${taskId}: ${task.title}`;
            document.getElementById('taskDesc').textContent = task.description;
            document.getElementById('testInput').innerHTML = task.test_input.replace(/\n/g, '<br>');
            document.getElementById('expectedOutput').textContent = task.expected_output;
        }

        // Обработчик выбора задания
        document.getElementById('taskSelect').addEventListener('change', (e) => {
            loadTask(e.target.value);
        });

        // Проверка кода
        async function checkCode() {
            const code = document.getElementById('codeArea').value;
            const taskId = document.getElementById('taskSelect').value;
            const task = tasks[taskId];

            if (!code.trim()) {
                showResult('Напиши код перед проверкой!', 'error');
                return;
            }

            showResult('⏳ Проверяю код...', 'loading');

            try {
                const response = await fetch('/check_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        code: code,
                        test_input: task.test_input,
                        expected_output: task.expected_output
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showResult(data.message, 'success');
                } else {
                    showResult(data.message, 'error');
                }

                if (data.output) {
                    showOutput(data.output);
                }
            } catch (error) {
                showResult('Ошибка при проверке. Попробуй еще раз.', 'error');
            }
        }

        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = `result ${type === 'success' ? 'success' : 'error'}`;
            if (type === 'loading') {
                resultDiv.style.background = '#e2e3e5';
                resultDiv.style.color = '#383d41';
            }
        }

        function showOutput(output) {
            const outputDiv = document.getElementById('output');
            outputDiv.textContent = `📤 Твой вывод:\n${output}`;
            outputDiv.className = 'output show';
        }

        // Загружаем первое задание
        loadTask('1');
    </script>
</body>
</html>
